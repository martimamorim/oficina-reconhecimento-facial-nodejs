<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reconhecimento Facial Alunos</title>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
<style>
body {
  font-family: Arial;
  text-align: center;
}
video {
  border: 2px solid black;
}
canvas {
  position: absolute;
}
</style>
</head>
<body>
<h2>Reconhecimento Facial + Emoções</h2>
<video id="video"
 width="720"
 height="560"
 autoplay
 muted>
</video>
<br><br>
<button onclick="capture()">
Capturar Foto
</button>
<script>
const video =
 document.getElementById("video");
let faceMatcher;
// ============================

// CARREGAR MODELOS

// ============================
async function loadModels() {
 await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
 await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
 await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
 await faceapi.nets.faceExpressionNet.loadFromUri('/models');
 console.log("Modelos carregados");
}
// ============================
// CARREGAR ALUNOS
// ============================
async function loadStudents() {
 const labels = [
   "EduardoMachado",
   "FredericoLeitoas",
   "GoncalinhoFerreirinha",
   "HenriqueOliveira",
   "LuisSantos",
   "MarceloPalam",
   "MartimAmorim",
   "RenanStrat",
   "RubenAlves",
   "RuiLeite",
   "SaloPeixoto",
   "SantinhoDaSilva",
   "SergioKaram",
   "TiagoVizela",
   "TomasBomba",
   "TomasGranja"
 ];
 return Promise.all(
  labels.map(async label => {
   const descriptions = [];
   for (let i = 1; i <= 1; i++) {
    const img =
      await faceapi.fetchImage(
       `/students/${label}/${i}.jpg`
      );
    const detection =
      await faceapi
        .detectSingleFace(img)
        .withFaceLandmarks()
        .withFaceDescriptor();
    descriptions.push(
      detection.descriptor
    );
   }
   return new faceapi
     .LabeledFaceDescriptors(
       label,
       descriptions
     );
  })
 );
}
// ============================
// CONFIGURAR RECONHECIMENTO
// ============================
async function setupRecognition() {
 const labeledDescriptors =
   await loadStudents();
 faceMatcher =
   new faceapi.FaceMatcher(
     labeledDescriptors,
     0.6
   );
 console.log("Reconhecimento pronto");
}
// ============================
// INICIAR WEBCAM
// ============================
async function startVideo() {
 const stream =
   await navigator
    .mediaDevices
    .getUserMedia({ video: true });
 video.srcObject = stream;
}
// ============================
// INICIALIZAÇÃO
// ============================
async function init() {
 await loadModels();
 await setupRecognition();
 await startVideo();
}
init();
// ============================
// CAPTURAR FOTO
// ============================
async function capture() {
 const detections =
  await faceapi
   .detectAllFaces(video)
   .withFaceLandmarks()
   .withFaceExpressions()
   .withFaceDescriptors();
 if (detections.length === 0) {
  alert("Nenhum rosto detectado");
  return;
 }
 // ============================
 // DETECTAR EMOÇÃO
 // ============================
 const expressions =
   detections[0].expressions;
 let emotion = "neutral";
 let max = 0;
 for (let key in expressions) {
  if (expressions[key] > max) {
   max = expressions[key];
   emotion = key;
  }
 }
 console.log("Emoção:", emotion);
 // ============================
 // IDENTIFICAR ALUNO
 // ============================
 const bestMatch =
  faceMatcher
   .findBestMatch(
    detections[0].descriptor
   );
 const name =
  bestMatch.toString();
 console.log("Aluno:", name);
 // ============================
 // CAPTURAR IMAGEM
 // ============================
 const snapshot =
   document.createElement("canvas");
 snapshot.width = video.width;
 snapshot.height = video.height;
 const ctx = snapshot.getContext("2d");
 ctx.drawImage(
   video,
   0,
   0
 );
 snapshot.toBlob(
  async (blob) => {
   const formData =
     new FormData();
   formData.append(
     "photo",
     blob
   );
   formData.append(
     "emotion",
     emotion
   );
   formData.append(
     "name",
     name
   );
   await fetch("/upload", {
    method: "POST",
    body: formData
   });
   alert(
    "Aluno: " + name +
    "\nEmoção: " + emotion
   );
 });
}
</script>
</body>
</html>
